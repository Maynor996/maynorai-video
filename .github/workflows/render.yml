name: Render Remotion Video
on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Dependencies
        run: |
          cd maynorai-video
          npm install
      - name: Render Video
        run: |
          cd maynorai-video
          npx remotion render Main out.mp4
      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          name: remotion-video
          path: maynorai-video/out.mp4
